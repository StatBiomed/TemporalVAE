model_params:
  name: 'SuperviseVanillaVAE_regressionClfDecoder_adversarial'
  in_channels: 0
  latent_dim: 50


data_params:
  data_path: "Data/"
  train_batch_size: 64
  val_batch_size: 64
  patch_size: 64
  num_workers: 4


exp_params:
  submodel: 'batchEffect_decoder'
  LR: 0.005
  LR_2: 0.005 #Used for adversarial training
  weight_decay: 0.0
  scheduler_gamma: 0.95
  scheduler_gamma_2: 0.95 #Used for adversarial training
  kld_weight: 0.00025
  clf_weight: 1 # 2023-09-13 13:45:52 Used for time loss weight
  batch_weight: 0.25 #Used for adversarial training
  manual_seed: 1265
  epoch_milestone: [ 30,31,32,33,34,50, 51, 52, 53, 54,70, 71, 72, 73, 74, 90, 91, 92, 93, 94 ] # epoch index list, which epoch 1.active batchEffect_decoder; 2.freeze encoder, decoder, and clf-decoder
  epoch_adversarial: [ 35,36,37,38,39,55, 56, 57, 58, 59,75, 76, 77, 78, 79, 95, 96, 97, 98, 99 ] # epoch index list, which epoch 1. freeze batchEffect_decoder, decoder; 2.active encoder, decoder, and clf-decoder; 3. add -loss batchEffect_decoder, make prediction as bad as possible.
  train_bn: False

trainer_params:
  gpus: [ 1 ]
  max_epochs: 100

logging_params:
  save_dir: "logs/"
  name: "SuperviseVanillaVAE_regressionClfDecoder_adversarial"
  
